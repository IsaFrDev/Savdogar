<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&amp;display=swap');
      
      .st-bg {
        fill: #FFFFFF;
      }
      
      .st-shape {
        fill: #4F46E5; /* Indigo-600 */
      }
      
      .st-shape-light {
        fill: #818CF8; /* Indigo-400 */
      }
      
      .st-text {
        font-family: 'Outfit', sans-serif;
        font-size: 64px;
        font-weight: 600;
        fill: #0F172A; /* Slate-900 */
        letter-spacing: 4px;
      }

      .st-subtext {
        font-family: 'Outfit', sans-serif;
        font-size: 24px;
        font-weight: 300;
        fill: #64748B; /* Slate-500 */
        letter-spacing: 12px;
      }
    </style>
    
    <!-- Soft, elegant drop shadow -->
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.08" flood-color="#0F172A" />
    </filter>
  </defs>
  
  <!-- Clean white background with soft rounded corners -->
  <rect width="512" height="512" rx="180" class="st-bg" />
  
  <!-- Minimalist Abstract 'S' Graphic -->
  <g transform="translate(256, 180)" filter="url(#soft-shadow)">
    <!-- Top curve -->
    <path d="M-60,-60 A60,60 0 0,1 60,-60 L60,-20 A20,20 0 0,0 20,-20 L-60,-20 Z" class="st-shape" />
    
    <!-- Middle connection -->
    <path d="M-60,-20 L20,20 L60,20 L-20,-20 Z" class="st-shape-light" />
    
    <!-- Bottom curve -->
    <path d="M60,60 A60,60 0 0,1 -60,60 L-60,20 A20,20 0 0,0 -20,20 L60,20 Z" class="st-shape" />
    
    <!-- Center elegant dot -->
    <circle cx="0" cy="0" r="16" class="st-shape-light" />
  </g>
  
  <!-- Modern Clean Typography -->
  <text x="50%" y="75%" text-anchor="middle" class="st-text">SAVDOON</text>
  <text x="52%" y="85%" text-anchor="middle" class="st-subtext">ENTERPRISE</text>
</svg>
